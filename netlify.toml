[build]
  command = "npm install && npm install vite@5.1.4 --save-dev && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18.18.0"
  NODE_ENV = "production"
  NPM_FLAGS = "--legacy-peer-deps"
  PYTHON_VERSION = "3.9"
  RUBY_VERSION = "2.7.2"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 
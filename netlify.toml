[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18.18.0"
  NODE_ENV = "production"
  NPM_FLAGS = "--legacy-peer-deps"
  GO_VERSION = ""
  PHP_VERSION = ""
  PYTHON_VERSION = ""
  RUBY_VERSION = ""
  NPM_VERSION = "9.8.1"

[build.processing]
  skip_processing = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 